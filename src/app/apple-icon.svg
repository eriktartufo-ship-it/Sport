<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sfondo Liquid Glass dark (coerente con app shell) -->
  <rect width="180" height="180" rx="38" fill="url(#bgGrad)" />

  <!-- Palla basket centrale -->
  <circle cx="90" cy="90" r="60" fill="url(#brandGrad)" />

  <!-- Highlight sheen -->
  <ellipse cx="90" cy="68" rx="40" ry="10" fill="rgba(255,255,255,0.20)" />

  <!-- Linee basket -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)">
    <line x1="90" y1="30" x2="90" y2="150" />
    <path d="M 30 60 Q 64 90 30 120" />
    <path d="M 150 60 Q 116 90 150 120" />
    <line x1="28" y1="90" x2="152" y2="90" />
  </g>

  <!-- Bordo glass -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
</svg>

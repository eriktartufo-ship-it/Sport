<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gradient brand identico a .title / .app-header-brand / nav -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <!-- Glow esterno per affordance liquid -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Palla basket: cerchio con bg gradient brand -->
  <circle cx="32" cy="32" r="28" fill="url(#brandGrad)" />

  <!-- Highlight interno (Liquid Glass top sheen) -->
  <ellipse cx="32" cy="22" rx="20" ry="6" fill="rgba(255,255,255,0.18)" />

  <!-- Linee del basket (segni dello spicchio) - bianco semi-trasparente -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#glow)">
    <!-- Linea verticale centrale -->
    <line x1="32" y1="6" x2="32" y2="58" />
    <!-- Curva sinistra (concava verso il centro) -->
    <path d="M 6 22 Q 22 32 6 42" />
    <!-- Curva destra -->
    <path d="M 58 22 Q 42 32 58 42" />
    <!-- Linea orizzontale centrale -->
    <line x1="4" y1="32" x2="60" y2="32" />
  </g>

  <!-- Bordo esterno glass -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" />
</svg>

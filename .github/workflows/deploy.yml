# Build & Deploy: push su `main` → builda immagine Docker → pubblica su GHCR → SSH alla VPS che fa pull+restart.
#
# PREREQUISITI (una tantum, NON gestiti da questo workflow):
#   - Sulla VPS, in /opt/sport/, deve esistere docker-compose.yml + .env con APP_IMAGE valorizzato.
#   - Sulla VPS, l'utente `deploy` deve essere autenticato a ghcr.io (docker login con PAT read:packages).
#   - GitHub Secrets necessari: VPS_SSH_HOST, VPS_SSH_USER, VPS_SSH_KEY, VPS_SSH_PORT (opzionale).
#   - Settings → Actions → Workflow permissions: "Read and write permissions" attivo.

name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR vuole il path immagine in lowercase (es. ghcr.io/eriktartufo/sport).
      # `github.repository` può contenere maiuscole se l'org/repo le ha.
      - name: Compute lowercase image name
        id: img
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "image=${{ env.REGISTRY }}/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          # Applica `latest` su entrambi i branch supportati (main o master),
          # in modo indipendente da quale sia il default branch su GitHub.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # Self-hosted runner SUL VPS (pattern Macro, 2026-06-06). NIENTE SSH in ingresso:
    # i runner GitHub-hosted non raggiungono la :22 del VPS (Hostinger blocca i range
    # Azure -> "dial tcp :22 i/o timeout"). Il runner gira sul VPS e fa tutto in locale.
    runs-on: [self-hosted, linux, vps-sport]
    steps:
      - name: Checkout (per sync docker-compose.yml)
        uses: actions/checkout@v4

      - name: Sync compose + pull & restart
        run: |
          set -euo pipefail
          # docker-compose.yml dal commit deployato -> /opt/sport (il .env resta intatto).
          install -m 644 docker-compose.yml /opt/sport/docker-compose.yml
          cd /opt/sport
          docker compose pull
          docker compose up -d
          docker image prune -f

      - name: Smoke test (HTTPS endpoint)
        run: |
          set -euo pipefail
          # Aspetta che Traefik aggiorni il routing al nuovo container.
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 -o /dev/null https://sport.pieranlab.cloud/; then
              echo "✓ sport.pieranlab.cloud risponde 2xx"
              exit 0
            fi
            echo "Tentativo $i fallito, retry tra 5s..."
            sleep 5
          done
          echo "✗ Smoke test fallito dopo 6 tentativi"
          exit 1
